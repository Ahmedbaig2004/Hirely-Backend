<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIRELY - Voice Interview Test</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.6;
      }
      .box {
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        background: #f9f9f9;
      }
      .hidden {
        display: none;
      }

      /* Button Styles */
      button {
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.2s;
      }

      .btn-primary {
        background: #007bff;
        color: white;
      }
      .btn-primary:hover {
        background: #0056b3;
      }

      /* Recording Button Styles */
      .btn-record {
        background: #dc3545;
        color: white;
        margin-right: 10px;
        width: 180px; /* Fixed width to prevent jumping */
      }
      .btn-record:hover {
        background: #c82333;
      }
      .recording-active {
        background: #bd2130 !important;
        animation: pulse 1.5s infinite;
      }

      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 4px;
        border: 1px solid #ddd;
        font-family: inherit;
      }
      .chat-bubble {
        background: #e9ecef;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
      }
      .ai-bubble {
        background: #d1e7dd;
        border-left: 5px solid #0f5132;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(220, 53, 69, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
        }
      }
    </style>
  </head>
  <body>
    <h1>🤖 HIRELY Voice Interface</h1>

    <div id="setup-phase" class="box">
      <h3>1. Start New Interview</h3>
      <label><strong>Job Description:</strong></label>
      <textarea id="jd" rows="4">
We need a Senior React Developer with experience in Next.js, TypeScript, and Performance Optimization.</textarea
      >
      <br /><br />
      <label><strong>Resume (PDF):</strong></label>
      <input type="file" id="resume" accept="application/pdf" />
      <br /><br />
      <button class="btn-primary" onclick="startInterview()">
        🚀 Analyze Resume & Start
      </button>
      <p id="loading-msg" class="hidden">
        ⏳ Analyzing... Please wait (5-10s)...
      </p>
    </div>

    <div id="interview-phase" class="box hidden">
      <h3>💬 Technical Interview</h3>
      <div
        id="gap-report"
        style="
          margin-bottom: 20px;
          padding: 10px;
          background: #fff3cd;
          border: 1px solid #ffecb5;
          border-radius: 5px;
        "
      >
        <strong>Gap Analysis:</strong> <span id="gap-text"></span>
      </div>

      <div class="chat-bubble ai-bubble">
        <strong>AI Interviewer:</strong>
        <p id="question-text" style="font-size: 1.2rem; font-weight: 500">
          ...
        </p>
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 10px">
        <button id="recordBtn" class="btn-record" onclick="toggleRecording()">
          🎤 Start Recording
        </button>
        <span style="align-self: center; color: #666">OR Type Answer:</span>
      </div>

      <textarea
        id="answer-input"
        rows="3"
        placeholder="Type your answer here..."
      ></textarea>
      <br />
      <button class="btn-primary" onclick="submitTextAnswer()">
        Submit Text
      </button>

      <p id="grading-msg" class="hidden">🤔 Transcribing & Grading...</p>

      <hr style="margin-top: 20px" />
      <h4>Recent Feedback:</h4>
      <div id="last-feedback" style="font-size: 0.9rem; color: #666">
        No feedback yet.
      </div>
      <div
        id="last-transcript"
        style="
          font-size: 0.9rem;
          color: #0d6efd;
          margin-top: 5px;
          font-style: italic;
        "
      ></div>
    </div>

    <div id="result-phase" class="box hidden">
      <h3>🏁 Interview Complete!</h3>
      <div
        id="final-verdict"
        style="font-size: 1.5rem; font-weight: bold; color: #198754"
      ></div>
      <p id="final-summary"></p>
      <h4>Full Report JSON:</h4>
      <pre id="json-dump"></pre>
      <button class="btn-primary" onclick="location.reload()">
        Start Over
      </button>
    </div>

    <script>
      let sessionId = null;
      let currentQuestionText = "";
      let mediaRecorder;
      let audioChunks = [];
      let isRecording = false; // STATE TRACKER

      // --- SETUP LOGIC ---
      async function startInterview() {
        const fileInput = document.getElementById("resume");
        const jdInput = document.getElementById("jd");

        if (fileInput.files.length === 0)
          return alert("Please select a PDF file");

        document.getElementById("loading-msg").classList.remove("hidden");

        const formData = new FormData();
        formData.append("resume", fileInput.files[0]);
        formData.append("jobDescription", jdInput.value);

        try {
          const res = await fetch("http://localhost:4000/api/init-interview", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();

          sessionId = data.sessionId;
          currentQuestionText = data.firstQuestion.question;

          document.getElementById("setup-phase").classList.add("hidden");
          document.getElementById("interview-phase").classList.remove("hidden");
          document.getElementById("gap-text").innerText =
            data.analysis.gapAnalysis.feedback;
          document.getElementById("question-text").innerText =
            currentQuestionText;
        } catch (err) {
          alert("Error starting interview: " + err.message);
        }
      }

      // --- TOGGLE RECORDING LOGIC ---
      function toggleRecording() {
        if (!isRecording) {
          startRecording();
        } else {
          stopAndSend();
        }
      }

      async function startRecording() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          // IMPORTANT: Explicitly use webm for Chrome/Edge
          const options = { mimeType: "audio/webm" };
          mediaRecorder = new MediaRecorder(stream, options);
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) audioChunks.push(event.data);
          };

          mediaRecorder.start();

          // UPDATE UI
          isRecording = true;
          const btn = document.getElementById("recordBtn");
          btn.innerText = "🟥 Stop & Send";
          btn.classList.add("recording-active");
        } catch (err) {
          alert("Microphone access denied: " + err.message);
        }
      }

      async function stopAndSend() {
        if (!mediaRecorder || mediaRecorder.state === "inactive") return;

        mediaRecorder.stop();

        // UPDATE UI
        isRecording = false;
        const btn = document.getElementById("recordBtn");
        btn.innerText = "⏳ Processing...";
        btn.classList.remove("recording-active");
        btn.disabled = true; // Prevent double clicks

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

          if (audioBlob.size < 1000) {
            alert("Recording too short! Please speak for at least 1 second.");
            resetRecordButton();
            return;
          }

          const formData = new FormData();
          formData.append("audio", audioBlob, "answer.webm");
          formData.append("sessionId", sessionId);
          formData.append("question", currentQuestionText);

          // SEND!
          await sendData(formData, true);
        };
      }

      function resetRecordButton() {
        const btn = document.getElementById("recordBtn");
        btn.innerText = "🎤 Start Recording";
        btn.disabled = false;
        btn.classList.remove("recording-active");
        isRecording = false;
      }

      // --- TEXT SUBMISSION ---
      async function submitTextAnswer() {
        const answerInput = document.getElementById("answer-input");
        const answer = answerInput.value;
        if (!answer) return alert("Type an answer!");

        await sendData({ answer: answer });
        answerInput.value = "";
      }

      // --- SHARED SEND FUNCTION (UPDATES UI) ---
      async function sendData(payload, isFile = false) {
        document.getElementById("grading-msg").classList.remove("hidden");

        try {
          const options = { method: "POST" };

          if (isFile) {
            options.body = payload;
          } else {
            options.headers = { "Content-Type": "application/json" };
            options.body = JSON.stringify({
              sessionId: sessionId,
              question: currentQuestionText,
              ...payload,
            });
          }

          const res = await fetch(
            "http://localhost:4000/api/submit-answer",
            options
          );
          const data = await res.json();

          // 1. Show Feedback
          const score = data.evaluation.score;
          const feedback = data.evaluation.feedback;
          document.getElementById(
            "last-feedback"
          ).innerHTML = `<strong>Last Score:</strong> <span class="score" style="color:${
            score > 50 ? "green" : "red"
          }">${score}/100</span> <br> <strong>Feedback:</strong> ${feedback}`;

          // 2. Show Transcript (if audio)
          if (data.transcript) {
            document.getElementById(
              "last-transcript"
            ).innerText = `🎙️ You said: "${data.transcript}"`;
          } else {
            document.getElementById("last-transcript").innerText = "";
          }

          // 3. CHECK GAME OVER or NEXT QUESTION
          if (data.isFinished) {
            document.getElementById("interview-phase").classList.add("hidden");
            document.getElementById("result-phase").classList.remove("hidden");
            document.getElementById("final-verdict").innerText =
              data.finalReport.decision;
            document.getElementById("final-summary").innerText =
              data.finalReport.summary;
            document.getElementById("json-dump").innerText = JSON.stringify(
              data.finalReport,
              null,
              2
            );
          } else {
            // 🚀 THIS MOVES TO THE NEXT QUESTION
            currentQuestionText = data.nextQuestion.question;
            document.getElementById("question-text").innerText =
              currentQuestionText;
          }
        } catch (err) {
          alert("Error submitting: " + err.message);
        } finally {
          // Cleanup UI
          document.getElementById("grading-msg").classList.add("hidden");
          resetRecordButton();
        }
      }
    </script>
  </body>
</html>
